<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Timer System</title>

    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 20px;
        background: #f4f4f9;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .timer-card {
        background: white;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        cursor: grab;
      }

      .timer-name {
        font-weight: bold;
        margin-bottom: 6px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        margin-top: 10px;
      }

      button {
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #ccc;
        cursor: pointer;
      }

      button:hover {
        background: #ddd;
      }

      .toggle {
        background: #cce5ff;
        font-weight: bold;
      }

      /* DISPLAY MODE */

      .display-mode {
        background: #111;
        color: #00ff00;
        font-family:
          Courier New,
          monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #display {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        width: 100%;
      }

      .timer-display {
        width: 260px;
        height: 200px;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        font-size: 6rem;
        font-variant-numeric: tabular-nums;

        border: 3px solid #444;
        border-radius: 15px;
      }

      .display-label {
        font-size: 1.5rem;
        color: #aaa;
        margin-bottom: 15px;
      }

      .paused {
        color: #ff4444;
        border-color: #660000;
      }

      .fullscreen-btn {
        position: fixed;
        top: 10px;
        right: 10px;
        padding: 10px 15px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="controllerUI">
      <div class="header">
        <h1>Timer Controller</h1>
        <div>
          <button onclick="openDisplay()">Open Timer View</button>
          <button onclick="addTimer()">Add Timer</button>
        </div>
      </div>
      <div>
        <button
          onclick="
            introSound.currentTime = 0;
            introSound.play();
          "
        >
          Intro muziek
        </button>
        <button
          onclick="
            bumperSound.currentTime = 0;
            bumperSound.play();
          "
        >
          Bumper muziek
        </button>
        <button
          onclick="
            finaleSound.currentTime = 0;
            finaleSound.play();
          "
        >
          Finale sfx
        </button>
        <button onclick="stopAllAudio()">Stop all audio</button>
        <input type="checkbox" id="isFinaleCheck" />
        <label for="isFinaleCheck">Is Finale</label>
      </div>
      <div id="controller"></div>
    </div>
    <div id="displayUI" style="display: none">
      <div id="display"></div>
    </div>
    <script>
      class AppState {
        static isFinale = false;
      }
      /* SETTINGS */

      const params = new URLSearchParams(location.search);
      const DISPLAY_MODE = params.get("display") === "1";

      const STEPS_SMALL = 10;
      const STEPS_MED = 30;
      const STEPS_BIG = 50;

      const channel = new BroadcastChannel("timers");

      /* SOUND SETTINGS */

      const introSound = new Audio("/deslimstemens/audio/intro.mp3");
      const bumperSound = new Audio("/deslimstemens/audio/bumper.mp3");
      const goedSound = new Audio("/deslimstemens/audio/goed.mp3");
      const foutSound = new Audio("/deslimstemens/audio/fout.mp3");
      const resumeSound = new Audio("/deslimstemens/audio/resume.mp3");
      const pauseSound = new Audio("/deslimstemens/audio/pauze.mp3");
      const finaleSound = new Audio("/deslimstemens/audio/finale.mp3");
      const finaleMuziekSound = new Audio(
        "/deslimstemens/audio/finale_muziek.mp3",
      );

      function getMixedResumeSound() {
        return AppState.isFinale ? finaleMuziekSound : resumeSound;
      }

      [
        introSound,
        bumperSound,
        goedSound,
        foutSound,
        resumeSound,
        pauseSound,
        finaleSound,
        finaleMuziekSound,
      ].forEach((a) => (a.preload = "auto"));

      /* STORE */

      const store = {
        timers: [
          { id: 1, name: "Timer 1", seconds: 0, paused: true },
          { id: 2, name: "Timer 2", seconds: 0, paused: true },
          { id: 3, name: "Timer 3", seconds: 0, paused: true },
          { id: 4, name: "Timer 4", seconds: 0, paused: true },
          { id: 5, name: "Timer 5", seconds: 0, paused: true },
        ],

        listener: null,

        subscribe(fn) {
          this.listener = fn;
        },

        notify() {
          if (this.listener) this.listener(this.timers);
          channel.postMessage(this.timers);
        },

        toggle(id) {
          const t = this.get(id);

          if (t.paused) {
            // pause all timers
            this.timers.forEach((timer) => {
              timer.paused = true;
            });

            // resume selected timer
            t.paused = false;

            getMixedResumeSound().currentTime = 0;
            getMixedResumeSound().play();
          } else {
            t.paused = true;
            stopAllAudio();
            pauseSound.currentTime = 0;
            pauseSound.play();
          }

          this.notify();
        },

        add(id, sec) {
          const t = this.get(id);
          t.seconds = Math.max(0, t.seconds + sec);
          this.notify();
        },

        rename(id, value) {
          this.get(id).name = value;

          // update display only
          channel.postMessage(this.timers);
        },

        get(id) {
          return this.timers.find((t) => t.id === id);
        },

        reorder(newOrder) {
          this.timers = newOrder;
          this.notify();
        },
      };

      /* TIMER LOOP */

      setInterval(() => {
        store.timers.forEach((t) => {
          if (!t.paused && t.seconds > 0) {
            t.seconds--;
          }
        });

        channel.postMessage(store.timers); // update display only

        // update seconds text without rebuilding cards
        store.timers.forEach((t) => {
          const el = document.querySelector(`#sec-${t.id}`);
          if (el)
            el.textContent = `${t.paused ? "Paused" : "Running"} (${t.seconds}s)`;
        });
      }, 1000);

      /* DISPLAY MODE */

      if (DISPLAY_MODE) {
        document.body.classList.add("display-mode");

        document.getElementById("controllerUI").style.display = "none";
        document.getElementById("displayUI").style.display = "block";

        const display = document.getElementById("display");

        function render(timers) {
          display.innerHTML = timers
            .map(
              (t) => `

<div class="timer-display ${t.paused ? "paused" : ""}">

<div class="display-label">${t.name}</div>

${t.seconds}

</div>

`,
            )
            .join("");
        }

        channel.onmessage = (e) => render(e.data);

        /* FULLSCREEN KEY */

        document.addEventListener("keydown", (e) => {
          if (e.key === "f") toggleFullscreen();
        });
      } else {
        /* CONTROLLER MODE */
        const container = document.getElementById("controller");

        store.subscribe(render);

        function render(timers) {
          container.innerHTML = "";

          timers.forEach((t, index) => {
            const card = document.createElement("div");
            card.className = "timer-card";
            card.draggable = true;
            card.dataset.index = index;

            card.innerHTML = `

<div class="timer-name">

<input value="${t.name}"
oninput="store.rename(${t.id},this.value)">

</div>

<div id="sec-${t.id}">
${t.paused ? "Paused" : "Running"} (${t.seconds}s)
</div>

<button onclick="removeTimer(${t.id})">Remove</button>
<button onclick="foutSound.currentTime = 0; foutSound.play();">Fout sfx</button>

<div class="controls">

<button onclick="store.add(${t.id},-${STEPS_BIG})">-50</button>
<button onclick="store.add(${t.id},-${STEPS_MED})">-30</button>
<button onclick="store.add(${t.id},-${STEPS_SMALL})">-10</button>

<button class="toggle"
onclick="store.toggle(${t.id})">
${t.paused ? "Resume" : "Pause"}
</button>

<button onclick="store.add(${t.id},${STEPS_SMALL}); goedSound.currentTime=0; goedSound.play();">+10</button>
<button onclick="store.add(${t.id},${STEPS_MED}); goedSound.currentTime=0; goedSound.play();">+30</button>
<button onclick="store.add(${t.id},${STEPS_BIG}); goedSound.currentTime=0; goedSound.play();">+50</button>

</div>

`;

            addDragEvents(card);

            container.appendChild(card);
          });
        }

        store.notify();
      }

      /* DRAG SORT */

      let draggedIndex = null;

      function addDragEvents(el) {
        el.addEventListener("dragstart", (e) => {
          draggedIndex = Number(el.dataset.index);
        });

        el.addEventListener("dragover", (e) => {
          e.preventDefault();
        });

        el.addEventListener("drop", (e) => {
          const targetIndex = Number(el.dataset.index);

          const timers = [...store.timers];

          const item = timers.splice(draggedIndex, 1)[0];

          timers.splice(targetIndex, 0, item);

          store.reorder(timers);
        });
      }

      /* ADD TIMER */

      function addTimer() {
        const id = Date.now();

        store.timers.push({
          id: id,
          name: "New Timer",
          seconds: 0,
          paused: true,
        });

        store.notify();
      }

      /* OPEN DISPLAY */

      function openDisplay() {
        window.open(
          location.pathname + "?display=1",
          "_blank",
          "width=1400,height=500",
        );
      }

      /* FULLSCREEN */

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      }

      function removeTimer(id) {
        store.timers = store.timers.filter((t) => t.id !== id);

        store.notify();
      }

      function stopAllAudio() {
        [
          introSound,
          bumperSound,
          goedSound,
          foutSound,
          resumeSound,
          pauseSound,
          finaleSound,
          finaleMuziekSound,
        ].forEach((a) => {
          a.pause();
          a.currentTime = 0;
        });
      }

      const checkbox = document.getElementById("isFinaleCheck");

      checkbox.addEventListener("change", function () {
        AppState.isFinale = checkbox.checked;
      });
    </script>
  </body>
</html>
